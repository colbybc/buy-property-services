<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="96" fill="#1A4D2E" opacity="0.06"/>
  <circle cx="100" cy="100" r="80" fill="#1A4D2E" opacity="0.06"/>
  <!-- Upward trend chart -->
  <rect x="40" y="48" width="120" height="100" rx="8" fill="#ffffff" stroke="#1A4D2E" stroke-width="3.5"/>
  <!-- Grid lines -->
  <line x1="56" y1="72" x2="144" y2="72" stroke="#1A4D2E" stroke-width="1" opacity="0.1"/>
  <line x1="56" y1="96" x2="144" y2="96" stroke="#1A4D2E" stroke-width="1" opacity="0.1"/>
  <line x1="56" y1="120" x2="144" y2="120" stroke="#1A4D2E" stroke-width="1" opacity="0.1"/>
  <!-- Trend line going up -->
  <polyline points="56,128 80,112 100,100 120,80 144,64" stroke="#8FB339" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Area under line -->
  <path d="M56,128 L80,112 L100,100 L120,80 L144,64 L144,136 L56,136 Z" fill="#8FB339" opacity="0.08"/>
  <!-- Data points -->
  <circle cx="56" cy="128" r="4" fill="#ffffff" stroke="#8FB339" stroke-width="2.5"/>
  <circle cx="80" cy="112" r="4" fill="#ffffff" stroke="#8FB339" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="4" fill="#ffffff" stroke="#8FB339" stroke-width="2.5"/>
  <circle cx="120" cy="80" r="4" fill="#ffffff" stroke="#8FB339" stroke-width="2.5"/>
  <circle cx="144" cy="64" r="4" fill="#ffffff" stroke="#8FB339" stroke-width="2.5"/>
  <!-- Arrow pointing up -->
  <path d="M148 72 L148 52" stroke="#E8922A" stroke-width="3" stroke-linecap="round"/>
  <polyline points="142,58 148,52 154,58" stroke="#E8922A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pound sign -->
  <text x="62" y="88" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A4D2E" opacity="0.3">£</text>
  <!-- Document / notice -->
  <rect x="72" y="148" width="56" height="36" rx="4" fill="#ffffff" stroke="#1A4D2E" stroke-width="2.5"/>
  <line x1="82" y1="158" x2="118" y2="158" stroke="#1A4D2E" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="82" y1="166" x2="110" y2="166" stroke="#1A4D2E" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="82" y1="174" x2="114" y2="174" stroke="#1A4D2E" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
