<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#1A4D2E" opacity="0.06"/>
  <circle cx="100" cy="100" r="80" fill="#1A4D2E" opacity="0.06"/>

  <!-- Camera body -->
  <rect x="40" y="72" width="120" height="80" rx="12" fill="#ffffff" stroke="#1A4D2E" stroke-width="4"/>

  <!-- Camera top / viewfinder bump -->
  <path d="M72 72 L80 56 L120 56 L128 72" fill="#ffffff" stroke="#1A4D2E" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Flash hotshoe -->
  <rect x="92" y="52" width="16" height="6" rx="2" fill="#1A4D2E" opacity="0.2"/>

  <!-- Main lens -->
  <circle cx="100" cy="112" r="28" fill="#e8f5ee" stroke="#1A4D2E" stroke-width="3.5"/>
  <circle cx="100" cy="112" r="20" fill="none" stroke="#1A4D2E" stroke-width="2" opacity="0.4"/>
  <circle cx="100" cy="112" r="12" fill="#1A4D2E" opacity="0.08"/>
  <circle cx="100" cy="112" r="6" fill="#1A4D2E" opacity="0.15"/>

  <!-- Lens reflection -->
  <ellipse cx="92" cy="104" rx="5" ry="3" fill="#ffffff" opacity="0.6" transform="rotate(-30 92 104)"/>

  <!-- Shutter button -->
  <circle cx="132" cy="66" r="6" fill="#E8922A" stroke="#D4872E" stroke-width="2"/>

  <!-- On/recording indicator -->
  <circle cx="56" cy="82" r="3" fill="#8FB339"/>

  <!-- Flash lines -->
  <line x1="148" y1="44" x2="156" y2="36" stroke="#E8922A" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="158" y1="52" x2="168" y2="48" stroke="#E8922A" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="136" y1="38" x2="138" y2="28" stroke="#E8922A" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Small photo frames -->
  <rect x="36" y="160" width="28" height="22" rx="3" fill="#ffffff" stroke="#1A4D2E" stroke-width="2" transform="rotate(-8 50 171)"/>
  <rect x="56" y="158" width="28" height="22" rx="3" fill="#ffffff" stroke="#1A4D2E" stroke-width="2" transform="rotate(4 70 169)"/>

  <!-- House icon in photo -->
  <path d="M62 172 L70 165 L78 172 L78 178 L62 178 Z" fill="#8FB339" opacity="0.3" stroke="#8FB339" stroke-width="1"/>
</svg>
