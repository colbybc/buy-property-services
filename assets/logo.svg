<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- House outline -->
  <g stroke="#1A4D2E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Roof -->
    <path d="M10 38 L38 12 L66 38"/>
    <!-- Roof peak extension -->
    <path d="M18 38 L18 68 L58 68 L58 38"/>
    <!-- Chimney -->
    <path d="M50 22 L50 16 L58 16 L58 28"/>
  </g>

  <!-- Checkmark circle area -->
  <circle cx="38" cy="48" r="16" fill="#E8922A" opacity="0.12"/>
  <!-- Checkmark -->
  <polyline points="27,48 35,56 50,38" stroke="#E8922A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- BUY PROPERTY text -->
  <text x="80" y="38" font-family="'Poppins', Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1A4D2E" letter-spacing="1">BUY PROPERTY</text>

  <!-- SERVICES text with lines -->
  <line x1="80" y1="52" x2="118" y2="52" stroke="#E8922A" stroke-width="1.5"/>
  <text x="122" y="58" font-family="'Poppins', Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#1A4D2E" letter-spacing="3">SERVICES</text>
  <line x1="218" y1="52" x2="256" y2="52" stroke="#E8922A" stroke-width="1.5"/>
</svg>
