<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="96" fill="#1A4D2E" opacity="0.06"/>
  <circle cx="100" cy="100" r="80" fill="#1A4D2E" opacity="0.06"/>
  <!-- Rocket / boost -->
  <g transform="translate(100,95) rotate(-45)">
    <!-- Rocket body -->
    <ellipse cx="0" cy="0" rx="16" ry="40" fill="#ffffff" stroke="#1A4D2E" stroke-width="3"/>
    <!-- Nose cone -->
    <path d="M-10,-32 Q0,-52 10,-32" fill="#E8922A" stroke="#E8922A" stroke-width="2"/>
    <!-- Window -->
    <circle cx="0" cy="-12" r="7" fill="#e8f5ee" stroke="#1A4D2E" stroke-width="2"/>
    <circle cx="0" cy="-12" r="3" fill="#8FB339" opacity="0.3"/>
    <!-- Fins -->
    <path d="M-16,24 L-28,38 L-12,32 Z" fill="#1A4D2E" opacity="0.2" stroke="#1A4D2E" stroke-width="2" stroke-linejoin="round"/>
    <path d="M16,24 L28,38 L12,32 Z" fill="#1A4D2E" opacity="0.2" stroke="#1A4D2E" stroke-width="2" stroke-linejoin="round"/>
    <!-- Exhaust -->
    <path d="M-8,38 Q0,52 8,38" fill="#E8922A" opacity="0.4"/>
    <path d="M-5,42 Q0,54 5,42" fill="#E8922A" opacity="0.25"/>
  </g>
  <!-- Speed lines -->
  <line x1="40" y1="156" x2="56" y2="140" stroke="#E8922A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="48" y1="164" x2="60" y2="152" stroke="#E8922A" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="32" y1="148" x2="44" y2="136" stroke="#E8922A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Stars / sparkles -->
  <polygon points="156,48 158,54 164,54 159,58 161,64 156,60 151,64 153,58 148,54 154,54" fill="#8FB339" opacity="0.5"/>
  <polygon points="48,56 49.5,60 54,60 50.5,62.5 52,66.5 48,64 44,66.5 45.5,62.5 42,60 46.5,60" fill="#8FB339" opacity="0.35"/>
  <!-- Small house -->
  <path d="M140 148 L152 138 L164 148 L164 164 L140 164 Z" fill="#ffffff" stroke="#1A4D2E" stroke-width="2" stroke-linejoin="round"/>
  <rect x="148" y="152" width="8" height="12" rx="1" fill="#e8f5ee" stroke="#1A4D2E" stroke-width="1.5"/>
  <!-- Upward arrow next to house -->
  <path d="M170 160 L170 142" stroke="#8FB339" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="166,146 170,142 174,146" stroke="#8FB339" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
