<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#1A4D2E" opacity="0.06"/>
  <circle cx="100" cy="100" r="80" fill="#1A4D2E" opacity="0.06"/>

  <!-- Document -->
  <rect x="52" y="32" width="72" height="96" rx="6" fill="#ffffff" stroke="#1A4D2E" stroke-width="4"/>
  <!-- Document fold -->
  <path d="M100 32 L124 32 L100 56 Z" fill="#e8f5ee" stroke="#1A4D2E" stroke-width="3" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="68" y1="72" x2="108" y2="72" stroke="#1A4D2E" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="68" y1="84" x2="100" y2="84" stroke="#1A4D2E" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <line x1="68" y1="96" x2="108" y2="96" stroke="#1A4D2E" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="68" y1="108" x2="92" y2="108" stroke="#1A4D2E" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <!-- Checkmark on document -->
  <circle cx="76" cy="56" r="10" fill="#8FB339" opacity="0.15"/>
  <polyline points="71,56 75,60 82,52" stroke="#8FB339" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Gavel -->
  <g transform="translate(108, 108) rotate(-35)">
    <!-- Gavel head -->
    <rect x="-20" y="-10" width="40" height="20" rx="5" fill="#E8922A" stroke="#D4872E" stroke-width="2"/>
    <!-- Gavel head bands -->
    <line x1="-12" y1="-10" x2="-12" y2="10" stroke="#D4872E" stroke-width="1.5" opacity="0.5"/>
    <line x1="12" y1="-10" x2="12" y2="10" stroke="#D4872E" stroke-width="1.5" opacity="0.5"/>
    <!-- Gavel handle -->
    <rect x="-4" y="10" width="8" height="36" rx="3" fill="#E8922A" stroke="#D4872E" stroke-width="2"/>
  </g>

  <!-- Sound block -->
  <ellipse cx="138" cy="164" rx="22" ry="8" fill="#1A4D2E" opacity="0.15"/>
  <rect x="120" y="152" width="36" height="14" rx="3" fill="#1A4D2E" opacity="0.25"/>

  <!-- Small impact lines around gavel -->
  <line x1="148" y1="120" x2="156" y2="114" stroke="#E8922A" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="154" y1="130" x2="164" y2="128" stroke="#E8922A" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="144" y1="112" x2="148" y2="104" stroke="#E8922A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
